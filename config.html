<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Configure Production Status</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .wrap { max-width: 360px; text-align: center; }
    h2 { font-size: 18px; margin-bottom: 0.5rem; }
    p { font-size: 13px; color: #888; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>🐛 Production Status</h2>
    <p>Click Save to add the dashboard to this channel. No configuration required — it already knows everything is fine.</p>
  </div>
  <script>
    function initTeams() {
      if (typeof microsoftTeams === "undefined") return;
      microsoftTeams.initialize();
      microsoftTeams.settings.registerOnSaveHandler(function(saveEvent) {
        microsoftTeams.settings.setSettings({
          websiteUrl: "https://moatas19m.github.io/vb3-prod-status",
          contentUrl: "https://moatas19m.github.io/vb3-prod-status",
          entityId: "prodstatus",
          suggestedDisplayName: "VB3 Prod Status"
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.settings.setValidityState(true);
    }
    window.addEventListener("load", initTeams);
  </script>
</body>
</html>
